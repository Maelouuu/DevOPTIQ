<!-- Code/routes/templates/activity_constraints.html -->

<div class="constraints-section">
  <h3>Contraintes et Exigences</h3>

  <div id="constraints-container-{{ item.activity.id }}">
    {% if item.constraints and item.constraints|length > 0 %}
      <ul>
        {% for c in item.constraints %}
          <li id="constraint-{{ c.id }}">
            <span class="constraint-text">{{ c.description }}</span>

            {% if c.file_path %}
              <a class="constraint-file-link" href="/utils/serve-file?path={{ c.file_path }}" target="_blank" title="Ouvrir : {{ c.file_path }}">
                <i class="fa-solid fa-paperclip"></i>
              </a>
            {% endif %}

            <button
              class="icon-btn"
              data-constraint='{{ {"id": c.id, "description": c.description, "file_path": c.file_path or ""}|tojson|safe }}'
              onclick="showEditConstraintForm(this)"
              title="Modifier"
            >
              <i class="fa-solid fa-pencil"></i>
            </button>

            <button class="icon-btn icon-btn-danger" onclick="deleteConstraint('{{ item.activity.id }}','{{ c.id }}')" title="Supprimer">
              <i class="fa-solid fa-trash"></i>
            </button>

            <!-- Formulaire d'édition caché -->
            <div id="edit-constraint-form-{{ c.id }}" style="display:none; margin-top:5px;">
              <input type="text" id="edit-constraint-input-{{ c.id }}" placeholder="Description" />
              <input type="text" id="edit-constraint-filepath-{{ c.id }}" placeholder="Chemin du fichier (optionnel)" style="margin-top:4px;" />
              <button class="icon-btn icon-btn-success" onclick="submitEditConstraint('{{ item.activity.id }}','{{ c.id }}')" title="Enregistrer"><i class="fa-solid fa-check"></i></button>
              <button class="icon-btn" onclick="hideEditConstraintForm('{{ c.id }}')" title="Annuler"><i class="fa-solid fa-xmark"></i></button>
            </div>
          </li>
        {% endfor %}
      </ul>
    {% else %}
      <p>Aucune contrainte enregistrée.</p>
    {% endif %}
  </div>

  <button class="btn-modal-primary-propose" onclick="showAddConstraintForm('{{ item.activity.id }}')"><i class="fa-solid fa-plus"></i> Ajouter une contrainte</button>
  <div id="add-constraint-form-{{ item.activity.id }}" style="display:none; margin-top:8px;">
    <input type="text" id="add-constraint-input-{{ item.activity.id }}" placeholder="Description de la contrainte *" />
    <input type="text" id="add-constraint-filepath-{{ item.activity.id }}" placeholder="Chemin du fichier lié (optionnel)" style="margin-top:4px;" />
    <button class="icon-btn icon-btn-success" onclick="submitAddConstraint('{{ item.activity.id }}')" title="Enregistrer"><i class="fa-solid fa-check"></i></button>
    <button class="icon-btn" onclick="hideAddConstraintForm('{{ item.activity.id }}')" title="Annuler"><i class="fa-solid fa-xmark"></i></button>
  </div>
</div>
